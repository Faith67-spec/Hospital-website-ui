<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="30" cy="30" r="28" fill="#0ea5e9" opacity="0.2"/>
  
  <!-- Hospital cross symbol -->
  <g transform="translate(30, 30)">
    <!-- Vertical bar of cross -->
    <rect x="-4" y="-12" width="8" height="24" fill="#0ea5e9" rx="2"/>
    <!-- Horizontal bar of cross -->
    <rect x="-12" y="-4" width="24" height="8" fill="#0ea5e9" rx="2"/>
  </g>
  
  <!-- Text "LifeCare" -->
  <text x="70" y="22" font-family="Poppins, sans-serif" font-size="20" font-weight="600" fill="#38bdf8">
    LifeCare
  </text>
  <text x="70" y="42" font-family="Poppins, sans-serif" font-size="10" fill="#0ea5e9" letter-spacing="1">
    HOSPITAL
  </text>
  
  <!-- Decorative line -->
  <line x1="70" y1="48" x2="200" y2="48" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
</svg>